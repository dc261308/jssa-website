services:
  - type: web
    name: jssa-website
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: SECRET_KEY
        generateValue: true        # Render generates a secure random value
      - key: ADMIN_PASSWORD
        sync: false                # Render will prompt you to enter this
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false                # paste the full service-account key JSON
      - key: SHEET_ID
        sync: false                # id of the "JSSA Website Content" sheet
